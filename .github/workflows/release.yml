name: Release

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      version:
        description: "semver 发版 tag（形如 v0.11.0）；留空则只跑构建"
        required: false
        default: ""

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Swift build
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4

      - name: Cache SwiftPM artifacts
        uses: actions/cache@v4
        with:
          path: |
            macos/.build
            macos/.swiftpm
          key: ${{ runner.os }}-spm-${{ hashFiles('macos/Package.swift', 'macos/Package.resolved') }}
          restore-keys: |
            ${{ runner.os }}-spm-

      - name: Show Swift toolchain
        working-directory: macos
        run: swift --version

      - name: Resolve dependencies
        working-directory: macos
        run: swift package resolve

      - name: Build (debug)
        working-directory: macos
        run: swift build

      - name: Build (release)
        working-directory: macos
        run: swift build -c release

      - name: Build site subproject (Astro, smoke test)
        # 真正的部署走 Vercel 的 GitHub integration（Vercel dashboard 里把项目 link 到这个 repo，
        # push main 时 Vercel 自己会 build + deploy + 绑 quotabar.ddonlien.com）。这里的 npm run
        # build 只是提前抓 site/ 的构建错误（marketing 主页破图不能等到 Vercel 才暴露）。
        working-directory: site
        run: |
          if [ -f package.json ]; then
            npm ci
            npm run build
          fi

  release:
    name: Package .dmg + GitHub Release
    needs: build
    # push main → nightly；workflow_dispatch 传 version → semver 稳定版。
    if: >-
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.version != '')
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4

      - name: Validate semver input
        if: github.event_name == 'workflow_dispatch'
        env:
          VERSION: ${{ github.event.inputs.version }}
        run: |
          echo "$VERSION" | grep -Eq '^v[0-9]+\.[0-9]+\.[0-9]+$' \
            || { echo "version 必须形如 v0.11.0，收到: '$VERSION'"; exit 1; }

      - name: Cache SwiftPM artifacts
        uses: actions/cache@v4
        with:
          path: |
            macos/.build
            macos/.swiftpm
          key: ${{ runner.os }}-spm-${{ hashFiles('macos/Package.swift', 'macos/Package.resolved') }}
          restore-keys: |
            ${{ runner.os }}-spm-

      - name: Build .app via build-app.sh
        working-directory: macos
        env:
          APP_NAME: QuotaBar
          SHORT_SHA: ${{ github.sha }}
          # semver 路径写入 CFBundleShortVersionString（去前导 v）；nightly 路径为空保持 "1.0"。
          VERSION: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.version || '' }}
        run: ./scripts/build-app.sh

      - name: Build .dmg
        env:
          APP_NAME: QuotaBar
          APP_BUNDLE_NAME: Quota Bar
          SHORT_SHA: ${{ github.sha }}
          VERSION: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.version || '' }}
        run: |
          set -euo pipefail
          APP="$GITHUB_WORKSPACE/macos/build/latest/${APP_BUNDLE_NAME}.app"
          test -d "$APP" || { echo "build-app.sh did not produce $APP"; exit 1; }
          STAGE="$RUNNER_TEMP/dmg-stage"
          rm -rf "$STAGE"
          mkdir -p "$STAGE"
          cp -R "$APP" "$STAGE/"
          ln -s /Applications "$STAGE/Applications"
          if [ -n "$VERSION" ]; then
            DMG="$RUNNER_TEMP/${APP_NAME}-${VERSION}.dmg"
          else
            DMG="$RUNNER_TEMP/${APP_NAME}-${SHORT_SHA::7}.dmg"
          fi
          hdiutil create \
            -volname "Quota Bar" \
            -srcfolder "$STAGE" \
            -ov \
            -format UDZO \
            "$DMG"
          echo "DMG=$DMG" >> "$GITHUB_ENV"
          ls -lh "$DMG"

      - name: Upload nightly to GitHub Release
        if: github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: nightly-${{ github.sha }}
          name: Nightly · ${{ github.event.head_commit.message }}
          body: |
            Automated nightly build from `${{ github.sha }}`.

            **Install**

            1. Download `QuotaBar-<short-sha>.dmg` below.
            2. Open it (double-click).
            3. Drag **Quota Bar** into **Applications** — or just double-click it inside the DMG window to run from there.

            > First launch requires right-click → Open. The binary is unsigned and not notarized.
          draft: false
          prerelease: true
          fail_on_unmatched_files: true
          files: ${{ env.DMG }}

      - name: Upload semver release
        if: github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.version }}
          name: Quota Bar ${{ github.event.inputs.version }}
          body: |
            Stable release ${{ github.event.inputs.version }} (from `${{ github.sha }}`).

            **Install**

            1. Download `QuotaBar-${{ github.event.inputs.version }}.dmg` below.
            2. Open it and drag **Quota Bar** into **Applications**.

            > First launch requires right-click → Open. The binary is unsigned and not notarized (v0.12.0 will add Developer ID + notarization).
          draft: false
          prerelease: false
          fail_on_unmatched_files: true
          files: ${{ env.DMG }}
