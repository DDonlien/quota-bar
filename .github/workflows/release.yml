name: Release

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Swift build
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4

      - name: Cache SwiftPM artifacts
        uses: actions/cache@v4
        with:
          path: |
            quota-bar/.build
            quota-bar/.swiftpm
          key: ${{ runner.os }}-spm-${{ hashFiles('quota-bar/Package.swift', 'quota-bar/Package.resolved') }}
          restore-keys: |
            ${{ runner.os }}-spm-

      - name: Show Swift toolchain
        working-directory: quota-bar
        run: swift --version

      - name: Resolve dependencies
        working-directory: quota-bar
        run: swift package resolve

      - name: Build (debug)
        working-directory: quota-bar
        run: swift build

      - name: Build (release)
        working-directory: quota-bar
        run: swift build -c release

      - name: Build web subproject (Astro)
        working-directory: web
        run: |
          if [ -f package.json ]; then
            npm ci
            npm run build
          fi

  release:
    name: Package .dmg + GitHub Release
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4

      - name: Cache SwiftPM artifacts
        uses: actions/cache@v4
        with:
          path: |
            quota-bar/.build
            quota-bar/.swiftpm
          key: ${{ runner.os }}-spm-${{ hashFiles('quota-bar/Package.swift', 'quota-bar/Package.resolved') }}
          restore-keys: |
            ${{ runner.os }}-spm-

      - name: Build .app via build-app.sh
        working-directory: quota-bar
        env:
          APP_NAME: QuotaBar
          SHORT_SHA: ${{ github.sha }}
        run: ./scripts/build-app.sh

      - name: Build .dmg
        env:
          APP_NAME: QuotaBar
          SHORT_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          APP="$GITHUB_WORKSPACE/quota-bar/build/latest/${APP_NAME}.app"
          test -d "$APP" || { echo "build-app.sh did not produce $APP"; exit 1; }
          STAGE="$RUNNER_TEMP/dmg-stage"
          rm -rf "$STAGE"
          mkdir -p "$STAGE"
          cp -R "$APP" "$STAGE/"
          ln -s /Applications "$STAGE/Applications"
          DMG="$RUNNER_TEMP/${APP_NAME}-${SHORT_SHA::7}.dmg"
          hdiutil create \
            -volname "Quota Bar" \
            -srcfolder "$STAGE" \
            -ov \
            -format UDZO \
            "$DMG"
          echo "DMG=$DMG" >> "$GITHUB_ENV"
          ls -lh "$DMG"

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: nightly-${{ github.sha }}
          name: Nightly · ${{ github.event.head_commit.message }}
          body: |
            Automated nightly build from `${{ github.sha }}`.

            **Install**

            1. Download `QuotaBar-<short-sha>.dmg` below.
            2. Open it (double-click).
            3. Drag **Quota Bar** into **Applications** — or just double-click it inside the DMG window to run from there.

            > First launch requires right-click → Open. The binary is unsigned and not notarized.
          draft: false
          prerelease: true
          fail_on_unmatched_files: true
          files: ${{ env.DMG }}
