name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    # 之前是 macos-14/macos-15 的双系统矩阵，但项目 Package.swift 要求 Swift
    # 6.2（swift-tools-version），这两台机器预装的工具链是 5.10，`swift package
    # resolve` 一步就直接报错，矩阵测的两边全灭，没有任何实际验证价值。改成跟
    # release.yml 一致的 macos-26（预装 Swift 6.2+），矩阵也就没有必要保留。
    name: swift build (macOS 26)
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4

      - name: Cache SwiftPM artifacts
        uses: actions/cache@v4
        with:
          path: |
            macos/.build
            macos/.swiftpm
          key: ${{ runner.os }}-spm-macos-26-${{ hashFiles('macos/Package.swift', 'macos/Package.resolved') }}
          restore-keys: |
            ${{ runner.os }}-spm-macos-26-

      - name: Show Swift toolchain
        working-directory: macos
        run: swift --version

      - name: Resolve dependencies
        working-directory: macos
        run: swift package resolve

      - name: Build (debug)
        working-directory: macos
        run: swift build

      - name: Build (release)
        working-directory: macos
        run: swift build -c release