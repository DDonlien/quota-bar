name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: swift build (macOS ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-14, macos-15]
    steps:
      - uses: actions/checkout@v4

      - name: Cache SwiftPM artifacts
        uses: actions/cache@v4
        with:
          path: |
            macos/.build
            macos/.swiftpm
          key: ${{ runner.os }}-spm-${{ matrix.os }}-${{ hashFiles('macos/Package.swift', 'macos/Package.resolved') }}
          restore-keys: |
            ${{ runner.os }}-spm-${{ matrix.os }}-

      - name: Show Swift toolchain
        working-directory: macos
        run: swift --version

      - name: Resolve dependencies
        working-directory: macos
        run: swift package resolve

      - name: Build (debug)
        working-directory: macos
        run: swift build

      - name: Build (release)
        working-directory: macos
        run: swift build -c release