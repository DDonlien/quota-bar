name: PR Check

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: pr-check-${{ github.ref }}
  cancel-in-progress: true

jobs:
  swift-build:
    name: swift build
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4

      - name: Cache SwiftPM artifacts
        uses: actions/cache@v4
        with:
          path: |
            macos/.build
            macos/.swiftpm
          key: ${{ runner.os }}-spm-${{ hashFiles('macos/Package.swift', 'macos/Package.resolved') }}
          restore-keys: |
            ${{ runner.os }}-spm-

      - name: Show Swift toolchain
        working-directory: macos
        run: swift --version

      - name: Resolve dependencies
        working-directory: macos
        run: swift package resolve

      - name: Build (debug)
        working-directory: macos
        run: swift build

  site-build:
    name: site build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: site
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: site/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
